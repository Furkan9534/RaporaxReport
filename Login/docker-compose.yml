version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: auth-api-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql

  api:
    image: auth-api
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-api-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db;Database=AuthApiDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True
      - JwtSettings__Key=YOUR_PRODUCTION_SECRET_KEY_MIN_32_CHARS_LONG
      - AdminSettings__Email=admin@system.com
      - AdminSettings__Password=AdminSystem_Production_2024!

volumes:
  sql-data:
